version: '3.8'

services:
  futu-opend:
    build:
      context: .
      dockerfile: futu-opend/Dockerfile
    container_name: futu-opend
    restart: unless-stopped
    network_mode: host
    environment:
      FUTU_LOGIN_ACCOUNT: ${FUTU_LOGIN_ACCOUNT:-36474237}
      FUTU_LOGIN_PWD_MD5: ${FUTU_LOGIN_PWD_MD5:-d63b1d22c9141885b5809965be2e9d64}
      HTTP_PROXY: http://ops.yl.c8g.top:7890
      HTTPS_PROXY: http://ops.yl.c8g.top:7890
      http_proxy: http://ops.yl.c8g.top:7890
      https_proxy: http://ops.yl.c8g.top:7890
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp | grep 2B67 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: http://ops.yl.c8g.top:7890
        HTTPS_PROXY: http://ops.yl.c8g.top:7890
    container_name: futu-agent-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config:/app/config
    environment:
      SERVER_PORT: "9080"
      FUTU_AGENT_FUTU_HOST: "127.0.0.1"
      FUTU_AGENT_FUTU_PORT: "11111"
      FUTU_AGENT_FUTU_ACCOUNT: ${FUTU_AGENT_FUTU_ACCOUNT:-36474237}
      FUTU_AGENT_FUTU_PASSWORD_MD5: ${FUTU_AGENT_FUTU_PASSWORD_MD5:-d63b1d22c9141885b5809965be2e9d64}
      FUTU_AGENT_LLM_BASE_URL: ${FUTU_AGENT_LLM_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      FUTU_AGENT_LLM_API_KEY: ${FUTU_AGENT_LLM_API_KEY:-tp-ca7ufcktq93n1d4os497i20jh592iwagxz5g1e50zmtoudim}
      FUTU_AGENT_LLM_MODEL: ${FUTU_AGENT_LLM_MODEL:-mimo-v2.5-pro}
      FUTU_AGENT_PROXY_HTTP: "http://ops.yl.c8g.top:7890"
      FUTU_AGENT_PROXY_HTTPS: "http://ops.yl.c8g.top:7890"
      FUTU_AGENT_TRADING_ENABLED: ${FUTU_AGENT_TRADING_ENABLED:-true}
      FUTU_AGENT_CONFIG_PATH: /app/config/config.yaml
    depends_on:
      futu-opend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: futu-agent-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "9000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
